<!-- PortalStandard.html — RPI Shared Portal Design System
     Include in each portal via: <?!= include('PortalStandard') ?>
     Each portal sets its own --portal, --portal-glow, --portal-accent on :root
     Master copy: _RPI_STANDARDS/reference/portal/PortalStandard.html
     Last updated: 2026-03-06 -->
<style>
/* ============================================================
   DARK MODE FOUNDATION
   ============================================================ */
:root {
  /* Dark base */
  --bg-deepest: #0a0a0f;
  --bg-dark: #111118;
  --bg-card: #1a1a24;
  --bg-card-hover: #22222e;
  --bg-surface: #2a2a36;
  --text-primary: #f0f0f5;
  --text-secondary: #8888a0;
  --text-muted: #55556a;
  --border-subtle: rgba(255,255,255,0.06);
  --border-medium: rgba(255,255,255,0.1);
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 14px;

  /* Section type colors */
  --pipeline-color: #63b3ed;
  --module-color: #a78bfa;
  --app-color: #f6ad55;
  --admin-color: #fc8181;
  --connect-color: #68d391;

  /* Portal brand — override per portal:
     PRODASHX:  --portal: #3d8a8f; --portal-glow: rgba(61,138,143,0.15); --portal-accent: #5bbfc5;
     SENTINEL:  --portal: #3CB371; --portal-glow: rgba(60,179,113,0.15); --portal-accent: #5dd99a;
     RIIMO:     --portal: #276749; --portal-glow: rgba(39,103,73,0.15); --portal-accent: #48bb78;
  */
}

/* ============================================================
   TOP BAR (Logo left, My RPI right)
   ============================================================ */
.portal-topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  background: var(--bg-card);
  border-bottom: 1px solid var(--border-subtle);
  min-height: 52px;
}
.portal-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  padding: 4px 8px;
  border-radius: var(--radius-sm);
  transition: background 0.2s;
}
.portal-logo:hover { background: var(--portal-glow); }
.portal-logo-icon {
  width: 32px;
  height: 32px;
  border-radius: var(--radius-sm);
  background: var(--portal);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  font-weight: 800;
  color: white;
}
.portal-logo-text {
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 0.5px;
  color: var(--portal-accent);
}
.portal-logo-subtitle {
  font-size: 10px;
  color: var(--text-muted);
  font-weight: 500;
}

/* My RPI button (top-right) */
.myrpi-button {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 12px;
  border-radius: var(--radius-md);
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border-subtle);
  cursor: pointer;
  transition: all 0.2s;
}
.myrpi-button:hover {
  background: var(--portal-glow);
  border-color: var(--portal);
}
.myrpi-avatar {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: var(--portal);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 700;
  color: white;
}
.myrpi-info { text-align: right; }
.myrpi-name {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-primary);
  line-height: 1.2;
}
.myrpi-role {
  font-size: 9px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

/* ============================================================
   LEFT SIDEBAR
   ============================================================ */
.sidebar {
  width: 200px;
  min-width: 200px;
  background: var(--bg-card);
  border-right: 1px solid var(--border-subtle);
  display: flex;
  flex-direction: column;
  padding: 8px 0;
  overflow-y: auto;
}

/* Sidebar section container */
.sidebar-section { margin: 2px 8px; }

/* Section header (icon + title + chevron) */
.sidebar-section-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 10px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  color: var(--text-muted);
  cursor: pointer;
  border-radius: var(--radius-sm);
  transition: all 0.25s ease;
  user-select: none;
  overflow: hidden;
}
.sidebar-section-header:hover {
  background: rgba(255,255,255,0.04);
  color: var(--text-secondary);
}

/* Spinning icon button */
.section-icon-btn {
  width: 34px;
  height: 34px;
  min-width: 34px;
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  position: relative;
}
.section-icon-btn .material-icons-outlined {
  font-size: 20px;
  transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}

/* Collapsed: icon prominent with subtle bg */
.sidebar-section-header.collapsed .section-icon-btn {
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border-subtle);
  box-shadow: 0 0 0 0 transparent;
}
.sidebar-section-header.collapsed:hover .section-icon-btn {
  background: rgba(255,255,255,0.08);
  border-color: var(--border-medium);
  transform: scale(1.08);
}

/* Expanded: icon transparent */
.sidebar-section-header:not(.collapsed) .section-icon-btn {
  background: transparent;
  border: 1px solid transparent;
}

/* Spin animations */
.section-icon-btn.spinning {
  animation: iconSpin 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.section-icon-btn.spinning-back {
  animation: iconSpinBack 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
}
@keyframes iconSpin {
  0% { transform: rotate(0deg) scale(1); }
  40% { transform: rotate(200deg) scale(1.15); }
  70% { transform: rotate(350deg) scale(1.05); }
  100% { transform: rotate(360deg) scale(1); }
}
@keyframes iconSpinBack {
  0% { transform: rotate(0deg) scale(1); }
  50% { transform: rotate(-180deg) scale(0.9); }
  100% { transform: rotate(-360deg) scale(1); }
}

/* Section title text (fades in/out) */
.section-title-text {
  opacity: 1;
  transform: translateX(0);
  transition: all 0.3s ease 0.1s;
  white-space: nowrap;
  flex: 1;
}
.sidebar-section-header.collapsed .section-title-text {
  opacity: 0;
  transform: translateX(-8px);
  transition: all 0.2s ease;
  width: 0;
  overflow: hidden;
}

/* Chevron */
.sidebar-section-header .chevron {
  font-size: 16px;
  transition: all 0.3s ease;
  color: var(--text-muted);
  opacity: 1;
}
.sidebar-section-header.collapsed .chevron {
  opacity: 0;
  width: 0;
  overflow: hidden;
}

/* Section items (collapsible) */
.sidebar-section-items {
  overflow: hidden;
  transition: max-height 0.35s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.25s ease;
  opacity: 1;
  max-height: 500px;
}
.sidebar-section-items.collapsed {
  max-height: 0 !important;
  opacity: 0;
}

/* Pipeline section colors */
.sidebar-section[data-type="pipeline"] .section-icon-btn .material-icons-outlined { color: var(--pipeline-color); }
.sidebar-section[data-type="pipeline"] .sidebar-section-header.collapsed .section-icon-btn {
  background: rgba(99,179,237,0.08); border-color: rgba(99,179,237,0.15);
}
.sidebar-section[data-type="pipeline"] .sidebar-section-header.collapsed:hover .section-icon-btn {
  background: rgba(99,179,237,0.15); box-shadow: 0 0 12px rgba(99,179,237,0.2);
}

/* Module section colors */
.sidebar-section[data-type="module"] .section-icon-btn .material-icons-outlined { color: var(--module-color); }
.sidebar-section[data-type="module"] .sidebar-section-header.collapsed .section-icon-btn {
  background: rgba(167,139,250,0.08); border-color: rgba(167,139,250,0.15);
}
.sidebar-section[data-type="module"] .sidebar-section-header.collapsed:hover .section-icon-btn {
  background: rgba(167,139,250,0.15); box-shadow: 0 0 12px rgba(167,139,250,0.2);
}

/* App section colors */
.sidebar-section[data-type="app"] .section-icon-btn .material-icons-outlined { color: var(--app-color); }
.sidebar-section[data-type="app"] .sidebar-section-header.collapsed .section-icon-btn {
  background: rgba(246,173,85,0.08); border-color: rgba(246,173,85,0.15);
}
.sidebar-section[data-type="app"] .sidebar-section-header.collapsed:hover .section-icon-btn {
  background: rgba(246,173,85,0.15); box-shadow: 0 0 12px rgba(246,173,85,0.2);
}

/* ============================================================
   NAV ITEMS (inside sidebar sections)
   ============================================================ */
.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 7px 10px 7px 16px;
  margin: 1px 0;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all 0.15s;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-secondary);
  position: relative;
}
.nav-item:hover {
  background: rgba(255,255,255,0.04);
  color: var(--text-primary);
}
.nav-item.active {
  background: var(--portal-glow);
  color: var(--portal-accent);
}
.nav-item.active::before {
  content: '';
  position: absolute;
  left: 0;
  top: 4px;
  bottom: 4px;
  width: 3px;
  border-radius: 0 2px 2px 0;
  background: var(--portal);
}
.nav-item .material-icons-outlined {
  font-size: 17px;
  opacity: 0.7;
}
.nav-item.active .material-icons-outlined {
  opacity: 1;
  color: var(--portal);
}

/* Pipeline nav items */
.nav-item.pipeline-item .material-icons-outlined { color: var(--pipeline-color); opacity: 0.8; }
.nav-item.pipeline-item:hover { background: rgba(99,179,237,0.08); }

/* Module nav items */
.nav-item.module-item .material-icons-outlined { color: var(--module-color); opacity: 0.8; }
.nav-item.module-item:hover { background: rgba(167,139,250,0.08); }

/* App nav items (dashed border, external icon) */
.nav-item.app-item {
  border: 1px dashed rgba(246,173,85,0.2);
  background: rgba(246,173,85,0.04);
  margin: 2px 0;
}
.nav-item.app-item .material-icons-outlined { color: var(--app-color); opacity: 0.9; }
.nav-item.app-item:hover { background: rgba(246,173,85,0.1); border-color: rgba(246,173,85,0.3); }
.app-badge {
  font-size: 8px;
  font-weight: 700;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  color: var(--app-color);
  background: rgba(246,173,85,0.12);
  padding: 1px 5px;
  border-radius: 3px;
  margin-left: auto;
}
.external-icon {
  font-size: 12px !important;
  margin-left: auto;
  color: var(--app-color) !important;
  opacity: 0.5 !important;
}

/* Admin section (pinned bottom) */
.sidebar-section.admin-section {
  margin-top: auto;
  padding-top: 8px;
  border-top: 1px solid var(--border-subtle);
}
.nav-item.admin-item {
  background: linear-gradient(135deg, rgba(252,129,129,0.06), rgba(252,129,129,0.02));
  border: 1px solid rgba(252,129,129,0.1);
}
.nav-item.admin-item .material-icons-outlined { color: var(--admin-color); }
.nav-item.admin-item:hover { background: rgba(252,129,129,0.1); }

/* Sidebar divider */
.sidebar-divider {
  height: 1px;
  background: var(--border-subtle);
  margin: 6px 16px;
}

/* ============================================================
   ADMIN TAB BAR
   ============================================================ */
.admin-tabs {
  display: flex;
  border-bottom: 1px solid var(--border-subtle);
  background: var(--bg-card);
  overflow-x: auto;
}
.admin-tab {
  padding: 10px 14px;
  font-size: 11px;
  font-weight: 600;
  color: var(--text-muted);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  white-space: nowrap;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 5px;
}
.admin-tab:hover { color: var(--text-secondary); }
.admin-tab.active {
  color: var(--portal-accent);
  border-bottom-color: var(--portal);
}
.admin-tab .material-icons-outlined { font-size: 14px; }
.admin-content {
  padding: 16px;
  min-height: 200px;
}

/* ============================================================
   MY RPI PANEL (Tabbed, same classes as admin)
   ============================================================ */
.myrpi-tabs {
  display: flex;
  border-bottom: 1px solid var(--border-subtle);
  background: var(--bg-card);
  overflow-x: auto;
}
.myrpi-tab {
  padding: 10px 14px;
  font-size: 11px;
  font-weight: 600;
  color: var(--text-muted);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  white-space: nowrap;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 5px;
}
.myrpi-tab:hover { color: var(--text-secondary); }
.myrpi-tab.active {
  color: var(--portal-accent);
  border-bottom-color: var(--portal);
}
.myrpi-tab .material-icons-outlined { font-size: 14px; }
.myrpi-content {
  padding: 16px;
  min-height: 200px;
}

/* Profile card (inside My RPI) */
.profile-card {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 16px;
}
.profile-avatar {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  background: var(--portal);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  font-weight: 700;
  color: white;
}
.profile-name {
  font-size: 14px;
  font-weight: 700;
  color: var(--text-primary);
}
.profile-email {
  font-size: 10px;
  color: var(--text-muted);
}
.profile-level {
  display: inline-flex;
  font-size: 9px;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 20px;
  background: rgba(167,139,250,0.12);
  color: var(--module-color);
  margin-top: 3px;
}
.profile-info-line {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 0;
  font-size: 11px;
  color: var(--text-secondary);
}
.profile-info-line .material-icons-outlined {
  font-size: 14px;
  color: var(--text-muted);
}

/* ============================================================
   MEETINGS TAB (meeting type CRUD + availability)
   ============================================================ */
.meeting-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.meeting-type-card {
  background: rgba(255,255,255,0.02);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-sm);
  padding: 10px;
}
.meeting-type-card.add-new {
  border-style: dashed;
  cursor: pointer;
}
.meeting-type-card.add-new:hover {
  background: rgba(255,255,255,0.04);
  border-color: var(--portal);
}
.meeting-type-name {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 4px;
}
.meeting-type-detail {
  font-size: 9px;
  color: var(--text-muted);
}
.meeting-slot {
  display: inline-flex;
  padding: 2px 6px;
  background: rgba(99,179,237,0.08);
  border-radius: 3px;
  font-size: 9px;
  color: var(--pipeline-color);
  margin: 2px 2px 0 0;
}

/* ============================================================
   PERMISSION MATRIX (Admin + My RPI Permissions tab)
   ============================================================ */
.perm-row {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 4px 0;
  font-size: 10px;
  color: var(--text-secondary);
  border-bottom: 1px solid var(--border-subtle);
}
.perm-row:last-child { border-bottom: none; }
.perm-name { flex: 1; }
.perm-check {
  width: 14px;
  height: 14px;
  border-radius: 3px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
}
.perm-check.on { background: rgba(104,211,145,0.15); color: var(--connect-color); }
.perm-check.off { background: rgba(255,255,255,0.03); color: var(--text-muted); }
.perm-header {
  font-size: 8px;
  font-weight: 700;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  width: 14px;
  text-align: center;
}

/* ============================================================
   STANDARD DARK COMPONENTS (cards, tables, forms, buttons, modals)
   ============================================================ */

/* Cards */
.std-card {
  background: var(--bg-card);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-md);
  padding: 16px;
}
.std-card:hover { border-color: var(--border-medium); }
.std-card-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--text-primary);
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.std-card-title .material-icons-outlined {
  font-size: 18px;
  color: var(--portal);
}

/* Tables */
.std-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
}
.std-table th {
  text-align: left;
  padding: 8px 10px;
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--text-muted);
  border-bottom: 1px solid var(--border-medium);
  background: var(--bg-card);
}
.std-table td {
  padding: 8px 10px;
  color: var(--text-secondary);
  border-bottom: 1px solid var(--border-subtle);
}
.std-table tr:hover td { background: rgba(255,255,255,0.02); }

/* Forms */
.std-input {
  background: var(--bg-dark);
  border: 1px solid var(--border-medium);
  border-radius: var(--radius-sm);
  padding: 8px 12px;
  font-size: 12px;
  color: var(--text-primary);
  width: 100%;
  outline: none;
  transition: border-color 0.2s;
}
.std-input:focus { border-color: var(--portal); }
.std-input::placeholder { color: var(--text-muted); }

.std-select {
  background: var(--bg-dark);
  border: 1px solid var(--border-medium);
  border-radius: var(--radius-sm);
  padding: 8px 12px;
  font-size: 12px;
  color: var(--text-primary);
  width: 100%;
  outline: none;
}

.std-label {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--text-muted);
  margin-bottom: 4px;
  display: block;
}

/* Buttons */
.std-btn {
  padding: 8px 16px;
  border-radius: var(--radius-sm);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  border: none;
  font-family: inherit;
}
.std-btn-primary {
  background: var(--portal);
  color: white;
}
.std-btn-primary:hover { filter: brightness(1.15); }
.std-btn-secondary {
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border-medium);
  color: var(--text-secondary);
}
.std-btn-secondary:hover {
  background: rgba(255,255,255,0.08);
  color: var(--text-primary);
}
.std-btn-danger {
  background: rgba(252,129,129,0.1);
  border: 1px solid rgba(252,129,129,0.2);
  color: var(--admin-color);
}
.std-btn-danger:hover { background: rgba(252,129,129,0.2); }
.std-btn .material-icons-outlined { font-size: 16px; }

/* Modals (dark variant, flexbox scroll) */
.std-modal-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.6);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}
.std-modal {
  background: var(--bg-dark);
  border: 1px solid var(--border-medium);
  border-radius: var(--radius-lg);
  width: 90%;
  max-width: 600px;
  display: flex;
  flex-direction: column;
  max-height: 90vh;
  overflow: hidden;
}
.std-modal-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border-subtle);
  font-size: 15px;
  font-weight: 700;
  color: var(--text-primary);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.std-modal-body {
  padding: 20px;
  flex: 1;
  overflow-y: auto;
  min-height: 0;
}
.std-modal-footer {
  padding: 12px 20px;
  border-top: 1px solid var(--border-subtle);
  display: flex;
  justify-content: flex-end;
  gap: 8px;
  flex-shrink: 0;
}

/* Badges / chips */
.std-badge {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  font-size: 9px;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 20px;
}
.std-badge-owner { background: rgba(252,129,129,0.12); color: var(--admin-color); }
.std-badge-leader { background: rgba(167,139,250,0.12); color: var(--module-color); }
.std-badge-user { background: rgba(255,255,255,0.05); color: var(--text-muted); }

/* Pipeline chips */
.pipeline-chip {
  font-size: 9px;
  font-weight: 600;
  padding: 3px 8px;
  border-radius: 20px;
  display: inline-flex;
  align-items: center;
  gap: 4px;
}
.pipeline-chip.blue { background: rgba(99,179,237,0.12); color: var(--pipeline-color); }
.pipeline-chip.green { background: rgba(104,211,145,0.12); color: var(--connect-color); }
.pipeline-chip.orange { background: rgba(246,173,85,0.12); color: var(--app-color); }

/* RPI Connect FAB */
.rpi-connect-fab {
  position: absolute;
  bottom: 14px;
  right: 14px;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: var(--connect-color);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  box-shadow: 0 4px 16px rgba(104,211,145,0.3);
  transition: all 0.2s;
  z-index: 10;
}
.rpi-connect-fab:hover {
  transform: scale(1.1);
  box-shadow: 0 6px 24px rgba(104,211,145,0.4);
}
.rpi-connect-fab .material-icons-outlined {
  font-size: 22px;
  color: var(--bg-deepest);
}
.fab-badge {
  position: absolute;
  top: -2px;
  right: -2px;
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: var(--admin-color);
  font-size: 9px;
  font-weight: 700;
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
}
.fab-label {
  position: absolute;
  bottom: -18px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 8px;
  font-weight: 600;
  color: var(--connect-color);
  white-space: nowrap;
  letter-spacing: 0.5px;
}

/* ============================================================
   TOAST / LOADING (standard patterns)
   ============================================================ */
.std-toast {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  padding: 10px 20px;
  border-radius: var(--radius-md);
  font-size: 12px;
  font-weight: 600;
  z-index: 99999;
  animation: toastSlideUp 0.3s ease;
}
.std-toast.success { background: rgba(104,211,145,0.15); color: var(--connect-color); border: 1px solid rgba(104,211,145,0.3); }
.std-toast.error { background: rgba(252,129,129,0.15); color: var(--admin-color); border: 1px solid rgba(252,129,129,0.3); }
.std-toast.info { background: rgba(99,179,237,0.15); color: var(--pipeline-color); border: 1px solid rgba(99,179,237,0.3); }
@keyframes toastSlideUp {
  from { transform: translateX(-50%) translateY(20px); opacity: 0; }
  to { transform: translateX(-50%) translateY(0); opacity: 1; }
}

/* Loading overlay */
.std-loading-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(10,10,15,0.7);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 99998;
}
.std-spinner {
  width: 36px;
  height: 36px;
  border: 3px solid var(--border-medium);
  border-top-color: var(--portal);
  border-radius: 50%;
  animation: stdSpin 0.8s linear infinite;
}
@keyframes stdSpin {
  to { transform: rotate(360deg); }
}

/* ============================================================
   SCROLLBAR
   ============================================================ */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--bg-surface); border-radius: 4px; }

/* ============================================================
   MAIN CONTENT AREA
   ============================================================ */
.main-content {
  flex: 1;
  padding: 16px;
  background: var(--bg-deepest);
  position: relative;
  overflow-y: auto;
}
</style>

<script>
/* ============================================================
   SIDEBAR TOGGLE (shared across all portals)
   ============================================================ */
function toggleSidebarSection(header) {
  var items = header.nextElementSibling;
  var iconBtn = header.querySelector('.section-icon-btn');
  var isCollapsed = header.classList.contains('collapsed');

  if (iconBtn) {
    iconBtn.classList.remove('spinning', 'spinning-back');
    void iconBtn.offsetWidth;
    iconBtn.classList.add(isCollapsed ? 'spinning' : 'spinning-back');
    setTimeout(function() {
      iconBtn.classList.remove('spinning', 'spinning-back');
    }, 500);
  }

  header.classList.toggle('collapsed');
  items.classList.toggle('collapsed');
}
</script>
